function pk(p,i){return p.pair+'_'+i;}
function bAvg(id,r,keys){const v=keys.map(q=>r[id+'_'+q]).filter(x=>x!==undefined);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}
function fmt(v){return v!==null?v.toFixed(1):'–';}
function sc(v,q){if(v===undefined||v===null)return'<td style="color:var(--color-text-tertiary)">–</td>';const tip=QN[q]?`<span class="tip">${QN[q]}: ${v}</span>`:'';return`<td class="s${v}"><span class="tooltip-wrap">${v}${tip}</span></td>`;}
function flatRows(){const rows=[];for(const p of allData()){for(const id of p.ids){const isAI=id.startsWith('ai_');const a27=bAvg(id,p.r,Q27),a8=bAvg(id,p.r,Q8),a91=p.r[id+'_9.1'],r92=p.r[id+'_9.2'];rows.push({p,id,isAI,a27,a8,a91,r92});}}return rows;}

function showTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach((b,i)=>{b.classList.toggle('active',['summary','dashboard','detail'][i]===t);});
  ['summary','dashboard','detail'].forEach(id=>document.getElementById('tab-'+id).style.display=t===id?'':'none');
  if(t==='summary')renderSummary();if(t==='dashboard')renderDashboard();if(t==='detail')renderDetail();
}

function renderSummary(){
  let rows=flatRows();
  if(filterType==='ai')rows=rows.filter(r=>r.isAI);else if(filterType==='real')rows=rows.filter(r=>!r.isAI);
  if(sortCol){rows.sort((a,b)=>{let va=0,vb=0;if(sortCol==='a27'){va=a.a27||0;vb=b.a27||0;}else if(sortCol==='a8'){va=a.a8||0;vb=b.a8||0;}else if(sortCol==='r92'){va=a.r92||0;vb=b.r92||0;}else if(sortCol==='type'){va=a.isAI?0:1;vb=b.isAI?0:1;}else if(sortCol==='pair'){va=+a.p.pair;vb=+b.p.pair;}return(va-vb)*sortDir;});}
  let h='<div class="filter-bar"><span style="font-size:11px;color:var(--color-text-secondary)">Filter:</span>';
  [{k:'all',l:'Kõik'},{k:'ai',l:'AI'},{k:'real',l:'Inimene'}].forEach(f=>{h+=`<button class="filter-btn${filterType===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.l}</button>`;});
  h+=`<span style="font-size:10px;color:var(--color-text-tertiary);margin-left:8px">${rows.length} rida · sorteerimiseks klõpsa veerupäisel</span></div>`;
  h+='<div style="overflow-x:auto"><table><thead><tr>';
  [{k:'pair',l:'Paar'},{k:'h',l:'H'},{k:'id',l:'ID'},{k:'type',l:'Tüüp'}].forEach(c=>{const ind=sortCol===c.k?(sortDir===1?' ▲':' ▼'):'';h+=`<th onclick="sortBy('${c.k}')">${c.l}<span class="sort-indicator">${ind}</span></th>`;});
  for(const q of Q27)h+=`<th><span class="tooltip-wrap">${q}<span class="tip">${QN[q]}</span></span></th>`;
  h+=`<th class="th-27" onclick="sortBy('a27')" style="cursor:pointer">⌀ 2–7<span class="sort-indicator">${sortCol==='a27'?(sortDir===1?' ▲':' ▼'):''}</span></th>`;
  for(const q of Q8)h+=`<th><span class="tooltip-wrap">${q}<span class="tip">${QN[q]}</span></span></th>`;
  h+=`<th class="th-8" onclick="sortBy('a8')" style="cursor:pointer">⌀ 8<span class="sort-indicator">${sortCol==='a8'?(sortDir===1?' ▲':' ▼'):''}</span></th>`;
  h+=`<th class="th-91"><span class="tooltip-wrap">9.1<span class="tip">Väärtus uurimiseks</span></span></th>`;
  h+=`<th style="background:#FEF3E2;border-left:3px solid #EF9F27;white-space:nowrap;cursor:pointer" onclick="sortBy('r92')">9.2 tuvastus<span class="sort-indicator">${sortCol==='r92'?(sortDir===1?' ▲':' ▼'):''}</span></th>`;
  h+='</tr></thead><tbody>';
  for(const row of rows){const{p,id,isAI,a27,a8,a91,r92}=row;const badge=isAI?'<span class="badge badge-ai">AI</span>':'<span class="badge badge-real">Inimene</span>';h+=`<tr><td><b>${p.pair}</b></td><td style="font-size:10px;color:var(--color-text-tertiary)">${p.hindaja}</td><td style="white-space:nowrap;font-weight:500">${id}</td><td>${badge}</td>`;for(const q of Q27)h+=sc(p.r[id+'_'+q],q);h+=`<td class="td-27">${fmt(a27)}</td>`;for(const q of Q8)h+=sc(p.r[id+'_'+q],q);h+=`<td class="td-8">${fmt(a8)}</td>`;h+=sc(a91,'9.1');h+=tdTv(r92);h+='</tr>';}
  h+='</tbody></table></div>';
  document.getElementById('tab-summary').innerHTML=h;
}
function setFilter(f){filterType=f;renderSummary();}
function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}renderSummary();}

function renderDashboard(){
  const rows=flatRows(),ai=rows.filter(r=>r.isAI),re=rows.filter(r=>!r.isAI);
  function mean(arr,key){const v=arr.map(r=>r[key]).filter(x=>x!==null&&x!==undefined);return v.length?(v.reduce((a,b)=>a+b,0)/v.length):null;}
  const aiC=ai.filter(r=>(r.r92||3)<=2).length,reC=re.filter(r=>(r.r92||3)>=4).length;
  function dc(l,v){return`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px"><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">${l}</div><div style="font-size:20px;font-weight:500">${v}</div></div>`;}
  function pb(l,c,t,fg){const p=t?Math.round(c/t*100):0;return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px"><span style="color:var(--color-text-secondary)">${l}</span><span style="font-weight:500;color:${fg}">${c}/${t} (${p}%)</span></div><div style="height:8px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden"><div style="height:8px;border-radius:4px;background:${fg};width:${p}%"></div></div></div>`;}
  let h=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem">`;
  h+=dc('Kokku hindamisi',rows.length)+dc('AI kirjeid',ai.length)+dc('Inimese kirjeid',re.length)+dc('Õige tuvastus',`${aiC+reC}/${rows.length}`);
  h+=`</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:1.5rem">`;
  h+=`<div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px"><p style="font-size:12px;font-weight:500;margin:0 0 12px">Ploki keskmised</p>`;
  [{l:'⌀ 2–7 kvaliteet',ai:mean(ai,'a27'),re:mean(re,'a27')},{l:'⌀ 8 autentsus',ai:mean(ai,'a8'),re:mean(re,'a8')},{l:'9.2 tuvastus (kesk.)',ai:mean(ai,'r92'),re:mean(re,'r92')}].forEach(m=>{h+=`<div style="margin-bottom:10px"><div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:3px">${m.l}</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:2px"><span style="font-size:10px;width:60px;color:#A32D2D">AI ${fmt(m.ai)}</span><div style="flex:1;height:5px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden"><div style="height:5px;border-radius:2px;background:#A32D2D;width:${((m.ai||0)/5*100).toFixed(0)}%"></div></div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;width:60px;color:#0F6E56">Inimene ${fmt(m.re)}</span><div style="flex:1;height:5px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden"><div style="height:5px;border-radius:2px;background:#1D9E75;width:${((m.re||0)/5*100).toFixed(0)}%"></div></div></div></div>`;});
  h+=`</div><div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px"><p style="font-size:12px;font-weight:500;margin:0 0 12px">Tuvastuse täpsus (9.2)</p>`;
  h+=pb('AI õigesti (9.2 ≤ 2)',aiC,ai.length,'#A32D2D')+pb('Inimene õigesti (9.2 ≥ 4)',reC,re.length,'#1D9E75');
  h+=`<p style="font-size:10px;color:var(--color-text-tertiary);margin-top:8px">1–2 = AI · 3 = nii ja naa · 4–5 = inimene</p></div></div>`;
  const allQ=[...Q27,...Q8,'9.1'],chartH=allQ.length*28+60;
  h+=`<div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px"><p style="font-size:12px;font-weight:500;margin:0 0 8px">Küsimuste keskmised</p><div style="display:flex;gap:12px;font-size:11px;margin-bottom:8px"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#F09595;display:inline-block"></span>AI</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:#5DCAA5;display:inline-block"></span>Inimene</span></div><div style="position:relative;width:100%;height:${chartH}px"><canvas id="qChart" role="img" aria-label="Küsimuste keskmised">Küsimuste keskmised.</canvas></div></div>`;
  document.getElementById('tab-dashboard').innerHTML=h;
  const aiAvgs=allQ.map(q=>{const v=ai.map(r=>r.p.r[r.id+'_'+q]).filter(x=>x!==undefined);return v.length?(v.reduce((a,b)=>a+b,0)/v.length):null;});
  const reAvgs=allQ.map(q=>{const v=re.map(r=>r.p.r[r.id+'_'+q]).filter(x=>x!==undefined);return v.length?(v.reduce((a,b)=>a+b,0)/v.length):null;});
  if(window._qChart)window._qChart.destroy();
  window._qChart=new Chart(document.getElementById('qChart'),{type:'bar',data:{labels:allQ,datasets:[{label:'AI',data:aiAvgs,backgroundColor:'#F09595',borderColor:'#A32D2D',borderWidth:1},{label:'Inimene',data:reAvgs,backgroundColor:'#5DCAA5',borderColor:'#1D9E75',borderWidth:1}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>QN[ctx[0].label]||ctx[0].label,label:ctx=>`${ctx.dataset.label}: ${ctx.raw!==null?ctx.raw.toFixed(1):'–'}`}}},scales:{x:{min:0,max:5,ticks:{stepSize:1},grid:{color:'rgba(128,128,128,0.1)'}},y:{ticks:{font:{size:10}}}}}});
}

function renderDetail(){
  const data=allData();
  let h='<div class="pair-select">';
  data.forEach((p,i)=>{h+=`<button class="pair-btn${pk(p,i)===currentPairKey?' active':''}" onclick="selectPair('${pk(p,i)}')">P${p.pair} ${p.hindaja}</button>`;});
  h+='</div>';
  const idx=data.findIndex((p,i)=>pk(p,i)===currentPairKey);const p=data[idx>=0?idx:0];if(!p){document.getElementById('tab-detail').innerHTML=h;return;}
  const dur=p.duration?`${Math.floor(p.duration/60)}m ${p.duration%60}s`:'–';
  h+=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem"><div class="mc"><div class="l">Kestus</div><div class="v">${dur}</div></div><div class="mc"><div class="l">Paar</div><div class="v">${p.pair}</div></div><div class="mc"><div class="l">Järjekord</div><div class="v" style="font-size:14px">${p.order}</div></div></div>`;
  for(const id of p.ids){
    const isAI=id.startsWith('ai_');const badge=isAI?'<span class="badge badge-ai">AI</span>':'<span class="badge badge-real">Inimene</span>';
    const a27=bAvg(id,p.r,Q27),a8=bAvg(id,p.r,Q8),a91=p.r[id+'_9.1'],r92=p.r[id+'_9.2'];
    h+=`<div style="border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px">`;
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:13px;font-weight:500">${id}</span>${badge}${tvPill(r92)}<span class="htag">${p.hindaja}</span></div>`;
    h+=`<div style="display:flex;gap:8px;margin:8px 0;flex-wrap:wrap"><span class="avg-pill ap-27">⌀ 2–7: ${fmt(a27)}</span><span class="avg-pill ap-8">⌀ 8: ${fmt(a8)}</span><span class="avg-pill ap-91">9.1: ${a91||'–'}</span></div>`;
    h+=`<div style="overflow-x:auto;margin-bottom:10px"><table style="min-width:500px"><thead><tr>`;
    for(const q of Q27)h+=`<th><span class="tooltip-wrap">${q}<span class="tip">${QN[q]}</span></span></th>`;
    h+=`<th class="th-27">⌀2–7</th>`;for(const q of Q8)h+=`<th><span class="tooltip-wrap">${q}<span class="tip">${QN[q]}</span></span></th>`;
    h+=`<th class="th-8">⌀8</th><th class="th-91">9.1</th><th style="background:#FEF3E2;border-left:3px solid #EF9F27">9.2</th></tr></thead><tbody><tr>`;
    for(const q of Q27)h+=sc(p.r[id+'_'+q],q);h+=`<td class="td-27">${fmt(a27)}</td>`;for(const q of Q8)h+=sc(p.r[id+'_'+q],q);h+=`<td class="td-8">${fmt(a8)}</td>`;h+=sc(a91,'9.1');h+=tdTv(r92);
    h+=`</tr></tbody></table></div>`;
    const fbs=Object.entries(p.fb||{}).filter(([k])=>k.startsWith(id+'_'));
    if(fbs.length){h+=`<div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px"><p style="font-size:10px;font-weight:500;color:var(--color-text-tertiary);margin:0 0 6px">TAGASISIDE</p>`;for(const[k,v]of fbs){const num=k.split('_').pop();h+=`<div class="fb-entry"><b>Q${num}</b>${v}</div>`;}h+=`</div>`;}
    h+=`</div>`;
  }
  document.getElementById('tab-detail').innerHTML=h;
}
function selectPair(k){currentPairKey=k;renderDetail();}
renderSummary();
</script>
